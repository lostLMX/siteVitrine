        .btn-atelier-primary:hover { background:linear-gradient(135deg,rgba(110,180,255,.30),rgba(80,120,220,.38)); border-color:rgba(191,233,255,.50); }
        .btn-atelier-primary:disabled { opacity:.55; cursor:not-allowed; }

        .btn-atelier-warn:hover { background:rgba(255,190,80,.08); border-color:rgba(255,190,80,.55); }

        .btn-atelier-logout:hover { background:rgba(255,80,80,.09); }

<script>
    const adminErrorEl = document.getElementById('atelier-error')
    function showError(msg) { adminErrorEl.textContent = msg; adminErrorEl.style.display = 'block' }
    function clearError()   { adminErrorEl.textContent = '';  adminErrorEl.style.display = 'none'  }
    function escapeHtml(s)  { return (s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])) }

    // Tabs
    document.querySelectorAll('.atelier-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.atelier-tab').forEach(t => t.classList.remove('active'))
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('d-none'))
            btn.classList.add('active')
            document.getElementById('tab-' + btn.dataset.tab).classList.remove('d-none')
        })
    })

    // Pagination helper
    function renderPagination(containerEl, total, page, pageSize, onPage) {
        const totalPages = Math.ceil(total / pageSize)
        if (totalPages <= 1) { containerEl.innerHTML = ''; return }
        const pages = new Set([1, totalPages])
        for (let i = Math.max(1, page - 2); i <= Math.min(totalPages, page + 2); i++) pages.add(i)
        const sorted = [...pages].sort((a, b) => a - b)
        let html = '<div class="pagination-wrap">'
        html += `<button class="pg-btn" ${page <= 1 ? 'disabled' : ''} data-pg="${page - 1}">←</button>`
        let prev = 0
        for (const p of sorted) {
            if (p - prev > 1) html += '<span class="pg-ellipsis">…</span>'
            html += `<button class="pg-btn${p === page ? ' active' : ''}" data-pg="${p}">${p}</button>`
            prev = p
        }
        html += `<button class="pg-btn" ${page >= totalPages ? 'disabled' : ''} data-pg="${page + 1}">→</button>`
        html += '</div>'
        containerEl.innerHTML = html
        containerEl.querySelectorAll('.pg-btn:not([disabled])').forEach(btn => {
            btn.addEventListener('click', () => onPage(Number(btn.dataset.pg)))
        })
    }

    // Galerie / Carrousel
    const CAROUSEL_PAGE_SIZE = 10
    let _carouselAllRows = [], _carouselPage = 1
    const _paginationCarouselEl = document.getElementById('pagination-carousel')

    async function renderList(category, listEl, countEl) {
        clearError(); listEl.innerHTML = ''; countEl.textContent = ''
        try {
            const rows = await listPhotos(category)
            _carouselAllRows = rows; _carouselPage = 1
            countEl.textContent = `${rows.length} element${rows.length!==1?'s':''}`
            await renderCarouselPage()
        } catch(e) { console.error(e); showError(e?.message||'Erreur') }
    }

    async function renderCarouselPage() {
        listCarousel.innerHTML = ''
        if (!_carouselAllRows.length) {
            listCarousel.innerHTML = '<div class="col-12" style="color:rgba(191,233,255,0.40);font-size:0.85rem;">Aucune photo.</div>'
            renderPagination(_paginationCarouselEl, 0, 1, CAROUSEL_PAGE_SIZE, ()=>{})
            return
        }
        const start = (_carouselPage - 1) * CAROUSEL_PAGE_SIZE
        const pageRows = _carouselAllRows.slice(start, start + CAROUSEL_PAGE_SIZE)

        // Rendu immédiat avec placeholders
        for (const row of pageRows) {
            const title = row.title ? escapeHtml(row.title) : 'Sans titre'
            const date  = row.created_at ? new Date(row.created_at).toLocaleString('fr-FR') : ''
            const col = document.createElement('div')
            col.className = 'col-md-6'
            col.dataset.rowId = row.id
            col.innerHTML = `<div class="photo-card">
                <div class="photo-placeholder">✷</div>
                <div class="photo-card-body"><div><div class="photo-card-title">${title}</div><div class="photo-card-date">${date}</div></div>
                <button class="btn-atelier-danger" data-photo-id="${row.id}" data-photo-path="${escapeHtml(row.path)}">Supprimer</button></div></div>`
            listCarousel.appendChild(col)
        }

        renderPagination(_paginationCarouselEl, _carouselAllRows.length, _carouselPage, CAROUSEL_PAGE_SIZE, async (p) => {
            _carouselPage = p
            await renderCarouselPage()
            document.getElementById('tab-carousel').scrollIntoView({behavior:'smooth', block:'start'})
        })

        // Chargement des images en arrière-plan
        ;(async () => {
            for (const row of pageRows) {
                try {
                    const url = await createSignedPhotoUrl(row.path)
                    const col = listCarousel.querySelector(`[data-row-id="${row.id}"]`)
                    if (!col) continue
                    const wrap = col.querySelector('.photo-placeholder')
                    if (!wrap) continue
                    const img = document.createElement('img')
                    img.src = url
                    img.alt = row.title ? escapeHtml(row.title) : 'Sans titre'
                    img.loading = 'lazy'
                    wrap.replaceWith(img)
                } catch(err) { console.error('[carousel] signedUrl failed:', row.path, err) }
            }
        })()
    }

    async function handleDelete(e, category, listEl, countEl) {
        const btn = e.target.closest('button[data-photo-id]'); if (!btn) return
        const id = btn.getAttribute('data-photo-id')
        if (!id || !confirm('Supprimer cette photo ?')) return
        btn.disabled = true
        try { const d = await deletePhotoRow(id); await deletePhotoFile(d?.path); await renderList(category,listEl,countEl) }
        catch(err) { console.error(err); showError(err?.message||'Erreur'); btn.disabled=false }
    }

    async function handleUpload({form,titleId,fileId,btnId,labelId,spinnerId,category,listEl,countEl}) {
        clearError()
        const file=document.getElementById(fileId).files[0], btn=document.getElementById(btnId)
        const label=document.getElementById(labelId), spinner=document.getElementById(spinnerId)
        btn.disabled=true; label.style.display='none'; spinner.style.display='inline-block'
        try {
            const path = await uploadPhotoFile(file)
            await insertPhotoRow({title:document.getElementById(titleId).value, path, category})
            form.reset(); await renderList(category,listEl,countEl)
        } catch(err) { console.error(err); showError(err?.message||'Erreur upload') }
        finally { btn.disabled=false; label.style.display='inline'; spinner.style.display='none' }
    }

    const listCarousel=document.getElementById('list-carousel'), countCarousel=document.getElementById('count-carousel')
    document.getElementById('upload-form-carousel').addEventListener('submit',async e=>{e.preventDefault();await handleUpload({form:e.target,titleId:'carousel-title',fileId:'carousel-file',btnId:'upload-btn-carousel',labelId:'uploadLabelCarousel',spinnerId:'uploadSpinnerCarousel',category:PHOTO_CATEGORY.CAROUSEL,listEl:listCarousel,countEl:countCarousel})})
    listCarousel.addEventListener('click',e=>handleDelete(e,PHOTO_CATEGORY.CAROUSEL,listCarousel,countCarousel))
    document.getElementById('refresh-carousel').addEventListener('click',()=>renderList(PHOTO_CATEGORY.CAROUSEL,listCarousel,countCarousel))
</script>
<script>
    // ── Quill ─────────────────────────────────────────────────────────
    const QUILL_TOOLBAR = [
        ['bold','italic','underline','strike'],
        [{header:[2,3,false]}],
        [{list:'ordered'},{list:'bullet'}],
        ['blockquote','link'],
        ['clean']
    ]
    const createQuill = new Quill('#quill-create', {
        theme: 'snow',
        placeholder: 'Décrivez la pièce : thème, matériaux, dimensions…',
        modules: { toolbar: QUILL_TOOLBAR }
    })

    // Articles
    const listArticlesEl=document.getElementById('list-articles'), countArticlesEl=document.getElementById('count-articles')
    const ARTICLES_PAGE_SIZE = 10
    let _articleAllRows = [], _articlePage = 1
    const _paginationArticlesEl = document.getElementById('pagination-articles')

    async function loadCreateFormTypes() {
        const container=document.getElementById('art-create-types')
        try {
            const types=await listArticleTypes()
            if (!types.length) { container.innerHTML='<span style="color:rgba(191,233,255,.35);font-size:.82rem;">Aucun type disponible. Créez-en dans l\'onglet Types.</span>'; return }
            container.innerHTML='<div class="d-flex flex-wrap gap-2">'+types.map(t=>`<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.82rem;color:rgba(191,233,255,.80);background:rgba(110,180,255,.07);border:1px solid rgba(110,180,255,.18);border-radius:8px;padding:5px 12px;"><input type="checkbox" name="create_type_id" value="${t.id}" style="accent-color:#9ed7ff;">${escapeHtml(t.name)}</label>`).join('')+'</div>'
        } catch(e) { container.innerHTML='<span style="color:rgba(255,140,140,.7);font-size:.82rem;">Erreur chargement types</span>' }
    }

    async function renderArticlePhotos(articleId, containerEl) {
        containerEl.innerHTML='<div style="color:rgba(191,233,255,.35);font-size:.8rem;">Chargement…</div>'
        try {
            const photos = await listArticlePhotos(articleId)
            if (!photos.length) { containerEl.innerHTML='<div style="color:rgba(191,233,255,.35);font-size:.8rem;">Aucune photo encore.</div>'; return }
            const grid = document.createElement('div')
            grid.className = 'article-photos-grid'
            let failCount = 0, lastErr = null
            for (const photo of photos) {
                let url=null; try { url=await createSignedPhotoUrl(photo.path) } catch(err){ console.error('[atelier] photo signedUrl failed:', photo.path, err); lastErr=err; failCount++; continue }
                if (!url) { failCount++; continue }
                const thumb=document.createElement('div'); thumb.className='art-photo-thumb'
                thumb.innerHTML=`<img src="${url}" alt="${escapeHtml(photo.caption||'')}" loading="lazy">
                    <button class="art-photo-del" data-art-photo-id="${photo.id}" data-art-photo-path="${escapeHtml(photo.path)}">✕</button>`
                grid.appendChild(thumb)
            }
            if (failCount === photos.length && lastErr) {
                containerEl.innerHTML=`<div style="color:rgba(255,140,140,.7);font-size:.8rem;">Erreur chargement photos : ${escapeHtml(lastErr.message)}</div>`
                return
            }
            containerEl.innerHTML=''; containerEl.appendChild(grid)
        } catch(e) { containerEl.innerHTML=`<div style="color:rgba(255,140,140,.7);font-size:.8rem;">${escapeHtml(e.message)}</div>` }
    }

    async function renderArticles() {
        clearError(); listArticlesEl.innerHTML=''; countArticlesEl.textContent=''
        try {
            const articles = await listArticles()
            _articleAllRows = articles; _articlePage = 1
            countArticlesEl.textContent=`${articles.length} article${articles.length!==1?'s':''}`
            await renderArticlesPage()
        } catch(e) { console.error(e); showError(e?.message||'Erreur articles') }
    }

    async function renderArticlesPage() {
        listArticlesEl.innerHTML=''
        if (!_articleAllRows.length) {
            listArticlesEl.innerHTML='<div style="color:rgba(191,233,255,0.40);font-size:0.85rem;">Aucun article.</div>'
            renderPagination(_paginationArticlesEl, 0, 1, ARTICLES_PAGE_SIZE, ()=>{})
            return
        }
        const start = (_articlePage - 1) * ARTICLES_PAGE_SIZE
        const pageArts = _articleAllRows.slice(start, start + ARTICLES_PAGE_SIZE)
        for (const art of pageArts) {
            const card=document.createElement('div'); card.className='article-mgmt-card'
            const date=art.created_at?new Date(art.created_at).toLocaleString('fr-FR'):''
            const hasCover=!!art.cover_path
            card.innerHTML=`
                <div class="article-mgmt-header" data-article-id="${art.id}">
                    <div><div class="article-mgmt-title">${escapeHtml(art.title)}</div><div class="article-mgmt-meta">${date}</div></div>
                    <div class="d-flex gap-2">
                        <a href="article.html?id=${art.id}" target="_blank" class="btn-atelier-ghost" style="font-size:.72rem;padding:4px 10px;" onclick="event.stopPropagation()">Voir ↗</a>
                        <button class="btn-atelier-danger" data-delete-article="${art.id}">Supprimer</button>
                    </div>
                </div>
                <div class="article-mgmt-body" id="art-body-${art.id}">
                    <div id="art-edit-${art.id}" style="padding:12px 0 4px;">
                        <p style="font-family:var(--font-title);font-size:.72rem;letter-spacing:.10em;text-transform:uppercase;color:rgba(191,233,255,.45);margin:0 0 10px;">✦ Modifier l'article</p>
                        <form class="art-edit-form" data-article-id="${art.id}">
                            <div class="cform-group">
                                <label class="cform-label">Titre</label>
                                <input type="text" name="title" class="cform-input" value="${escapeHtml(art.title)}" required>
                            </div>
                            <div class="cform-group" style="margin-top:8px;">
                                <label class="cform-label">Description</label>
                                <div id="quill-edit-${art.id}"></div>
                            </div>
                            <button type="submit" class="btn-atelier-primary" style="margin-top:10px;">&#10003; Enregistrer</button>
                        </form>
                        <hr style="border-color:rgba(191,233,255,.08);margin:14px 0;">
                    </div>
                    <div id="art-types-${art.id}"></div>
                    <div id="art-cover-${art.id}"></div>
                    <div id="art-photos-${art.id}"></div>
                    <hr style="border-color:rgba(191,233,255,.08);margin:14px 0;">
                    <p style="font-family:var(--font-title);font-size:.72rem;letter-spacing:.10em;text-transform:uppercase;color:rgba(191,233,255,.45);margin:0 0 10px;">Ajouter une photo</p>
                    <form class="art-photo-upload-form d-flex gap-2 flex-wrap align-items-center" data-article-id="${art.id}">
                        <input type="text" placeholder="Légende (optionnel)" class="cform-input" name="caption" style="flex:1;min-width:130px;">
                        <input type="file" accept="image/*" multiple class="cform-input art-photo-file" style="flex:1;min-width:130px;padding:6px 10px;cursor:pointer;">
                        <button type="submit" class="btn-atelier-primary" style="width:auto;padding:9px 16px;">↑</button>
                    </form>
                    ${hasCover?'':
                    `<hr style="border-color:rgba(191,233,255,.08);margin:14px 0;">
                    <p style="font-family:var(--font-title);font-size:.72rem;letter-spacing:.10em;text-transform:uppercase;color:rgba(191,233,255,.45);margin:0 0 10px;">Photo de couverture</p>
                    <form class="art-cover-upload-form d-flex gap-2 flex-wrap align-items-center" data-article-id="${art.id}">
                        <input type="file" accept="image/*" class="cform-input" style="flex:1;min-width:130px;padding:6px 10px;cursor:pointer;">
                        <button type="submit" class="btn-atelier-primary" style="width:auto;padding:9px 16px;">↑ Couverture</button>
                    </form>`}
                </div>`
            listArticlesEl.appendChild(card)
        }

        renderPagination(_paginationArticlesEl, _articleAllRows.length, _articlePage, ARTICLES_PAGE_SIZE, async (p) => {
            _articlePage = p
            await renderArticlesPage()
            document.getElementById('tab-articles').scrollIntoView({behavior:'smooth', block:'start'})
        })

        // Chargement des couvertures en parallèle après le rendu
        ;(async () => {
            await Promise.all(pageArts.filter(a => a.cover_path).map(async (art) => {
                try {
                    const url = await createSignedPhotoUrl(art.cover_path)
                    const el = document.getElementById(`art-cover-${art.id}`)
                    if (el) el.innerHTML = `<img src="${url}" class="article-mgmt-cover" alt="Couverture"><p style="font-size:.72rem;color:rgba(191,233,255,.4);margin:0 0 8px;">Couverture actuelle</p>`
                } catch(err) { console.error('[atelier] cover signedUrl failed:', art.cover_path, err) }
            }))
        })()
    }

    listArticlesEl.addEventListener('click', async e => {
        const delBtn=e.target.closest('[data-delete-article]')
        if (delBtn) {
            const id=delBtn.getAttribute('data-delete-article')
            if (!confirm('Supprimer cet article et toutes ses photos ?')) return
            delBtn.disabled=true
            try {
                const photos=await listArticlePhotos(id)
                for (const p of photos) await deletePhotoFile(p.path).catch(()=>{})
                const arts=await listArticles(); const art=arts.find(x=>x.id===id)
                if (art?.cover_path) await deletePhotoFile(art.cover_path).catch(()=>{})
                await deleteArticle(id); await renderArticles()
            } catch(err) { console.error(err); showError(err?.message||'Erreur'); delBtn.disabled=false }
            return
        }
        const delPhotoBtn=e.target.closest('.art-photo-del')
        if (delPhotoBtn) {
            const id=delPhotoBtn.getAttribute('data-art-photo-id'), path=delPhotoBtn.getAttribute('data-art-photo-path')
            if (!id||!confirm('Supprimer cette photo ?')) return
            delPhotoBtn.disabled=true
            try { await deleteArticlePhotoRow(id); await deletePhotoFile(path); delPhotoBtn.closest('.art-photo-thumb')?.remove() }
            catch(err) { console.error(err); showError(err?.message||'Erreur'); delPhotoBtn.disabled=false }
            return
        }
        const header=e.target.closest('.article-mgmt-header')
        if (header) {
            const id=header.getAttribute('data-article-id')
            const body=document.getElementById(`art-body-${id}`)
            body.classList.toggle('open')
            if (body.classList.contains('open')) {
                await renderArticlePhotos(id,document.getElementById(`art-photos-${id}`))
                await renderArticleTypes(id,document.getElementById(`art-types-${id}`))
                const quillWrap=document.getElementById(`quill-edit-${id}`)
                if (quillWrap && !quillWrap._quill) {
                    const q=new Quill(quillWrap,{theme:'snow',placeholder:'Description…',modules:{toolbar:QUILL_TOOLBAR}})
                    quillWrap._quill=q
                    const art=_articleAllRows.find(a=>a.id===id)
                    if (art?.description) q.clipboard.dangerouslyPasteHTML(art.description)
                }
            }
        }
    })

    listArticlesEl.addEventListener('submit', async e => {
        const photoForm=e.target.closest('.art-photo-upload-form'), coverForm=e.target.closest('.art-cover-upload-form')
        const editForm=e.target.closest('.art-edit-form'), typesForm=e.target.closest('.art-types-form')
        if (!photoForm && !coverForm && !editForm && !typesForm) return
        e.preventDefault()
        if (typesForm) {
            const articleId=typesForm.getAttribute('data-article-id')
            const typeIds=Array.from(typesForm.querySelectorAll('input[name=type_id]:checked')).map(cb=>cb.value)
            const btn=typesForm.querySelector('button[type=submit]')
            btn.disabled=true
            try {
                await setTypesForArticle(articleId,typeIds)
                btn.textContent='✓ Sauvegardé'
                setTimeout(()=>{btn.disabled=false;btn.textContent='✓ Enregistrer les types'},1500)
            } catch(err) { console.error(err); showError(err?.message||'Erreur types'); btn.disabled=false }
            return
        }
        if (editForm) {
            const id=editForm.getAttribute('data-article-id')
            const title=editForm.querySelector('[name=title]').value.trim()
            const quillWrap=document.getElementById(`quill-edit-${id}`)
            const rawHtml=quillWrap?._quill?.root.innerHTML||''
            const description=rawHtml==='' || rawHtml==='<p><br></p>' ? null : rawHtml
            if (!title) { showError('Le titre est requis.'); return }
            const btn=editForm.querySelector('button[type=submit]')
            btn.disabled=true
            try { await updateArticle(id,{title,description}); await renderArticles() }
            catch(err) { console.error(err); showError(err?.message||'Erreur modification') }
            finally { btn.disabled=false }
            return
        }
        const form=photoForm||coverForm, articleId=form.getAttribute('data-article-id')
        const fileInput=form.querySelector('input[type=file]')
        const files=fileInput ? Array.from(fileInput.files) : []
        const submitBtn=form.querySelector('button[type=submit]')
        if (!files.length) { showError('Veuillez sélectionner un fichier.'); return }
        submitBtn.disabled=true
        try {
            if (photoForm) {
                const caption=form.querySelector('input[name=caption]')?.value||null
                let sortOrder=(await listArticlePhotos(articleId)).length
                for (const file of files) {
                    const path=await uploadPhotoFile(file,'articles')
                    await insertArticlePhotoRow({article_id:articleId,path,caption,sort_order:sortOrder})
                    sortOrder++
                }
                form.reset(); await renderArticlePhotos(articleId,document.getElementById(`art-photos-${articleId}`))
            } else {
                const path=await uploadPhotoFile(files[0],'articles')
                await updateArticle(articleId,{cover_path:path}); form.reset(); await renderArticles()
            }
        } catch(err) { console.error(err); showError(err?.message||'Erreur upload') }
        finally { submitBtn.disabled=false }
    })

    document.getElementById('article-create-form').addEventListener('submit', async e => {
        e.preventDefault(); clearError()
        const title=document.getElementById('art-title').value.trim()
        const rawDesc=createQuill.root.innerHTML
        const desc=rawDesc===''||rawDesc==='<p><br></p>' ? '' : rawDesc
        const file=document.getElementById('art-cover-file').files[0]
        const extraFiles=Array.from(document.getElementById('art-extra-photos').files)
        const btn=document.getElementById('article-create-btn'), label=document.getElementById('artCreateLabel'), spinner=document.getElementById('artCreateSpinner')
        if (!title) { showError('Le titre est requis.'); return }
        btn.disabled=true; label.style.display='none'; spinner.style.display='inline-block'
        try {
            let cover_path=null; if (file) cover_path=await uploadPhotoFile(file,'articles')
            const newArt=await insertArticle({title,description:desc||null,cover_path})
            const typeIds=Array.from(document.querySelectorAll('#art-create-types input[name=create_type_id]:checked')).map(cb=>cb.value)
            if (typeIds.length) await setTypesForArticle(newArt.id,typeIds)
            let sortOrder=0
            for (const f of extraFiles) {
                const path=await uploadPhotoFile(f,'articles')
                await insertArticlePhotoRow({article_id:newArt.id,path,caption:null,sort_order:sortOrder})
                sortOrder++
            }
            e.target.reset(); createQuill.setContents([])
            document.querySelectorAll('.atelier-tab').forEach(t=>t.classList.remove('active'))
            document.querySelectorAll('.tab-pane').forEach(p=>p.classList.add('d-none'))
            document.querySelector('[data-tab="articles"]').classList.add('active')
            document.getElementById('tab-articles').classList.remove('d-none')
            await renderArticles()
        } catch(err) { console.error(err); showError(err?.message||'Erreur création') }
        finally { btn.disabled=false; label.style.display='inline'; spinner.style.display='none' }
    })

    document.getElementById('refresh-articles').addEventListener('click', renderArticles)

    // Sécurité
    document.getElementById('password-form').addEventListener('submit', async e => {
        e.preventDefault(); clearError()
        if (!confirm('Confirmer le changement de mot de passe ?')) return
        const label=document.getElementById('pwdLabel'), spinner=document.getElementById('pwdSpinner'), btn=document.getElementById('password-btn')
        btn.disabled=true; label.style.display='none'; spinner.style.display='inline-block'
        try { await updateMyPassword(document.getElementById('new-password').value); e.target.reset(); alert('Mot de passe mis à jour ✓') }
        catch(err) { console.error(err); showError(err?.message||'Erreur') }
        finally { btn.disabled=false; label.style.display='inline'; spinner.style.display='none' }
    })
    document.getElementById('toggle-password').addEventListener('click', () => {
        const input=document.getElementById('new-password'), hidden=input.type==='password'
        input.type=hidden?'text':'password'; document.getElementById('toggle-password').textContent=hidden?'🙈':'👁'
    })

    // Init
    async function initAdmin() {
        try {
            const session=await requireAdmin(); if (!session) return
            const el=document.getElementById('user-info'); el.classList.remove('d-none')
            el.innerHTML=`Connecté : <strong>${session.user.email}</strong>`
            await renderList(PHOTO_CATEGORY.CAROUSEL,listCarousel,countCarousel)
            await renderArticles()
            await renderTypes()
        } catch(err) {
            console.error('[initAdmin]', err)
            showError('Erreur initialisation : ' + (err?.message || err))
        }
    }
    initAdmin()
</script>
<script>
    // Types d'articles
    async function renderTypes() {
        clearError()
        const listEl=document.getElementById('list-types'), countEl=document.getElementById('count-types')
        listEl.innerHTML=''; countEl.textContent=''
        try {
            const types=await listArticleTypes()
            countEl.textContent=`${types.length} type${types.length!==1?'s':''}`
            loadCreateFormTypes()
            if (!types.length) { listEl.innerHTML='<div style="color:rgba(191,233,255,0.40);font-size:0.85rem;">Aucun type créé.</div>'; return }
            for (const t of types) {
                const row=document.createElement('div'); row.className='type-mgmt-row'; row.setAttribute('data-type-id',t.id)
                row.innerHTML=`
                    <div class="type-mgmt-display d-flex justify-content-between align-items-center">
                        <span class="type-mgmt-name">${escapeHtml(t.name)}</span>
                        <div class="d-flex gap-2">
                            <button class="btn-atelier-ghost btn-type-edit" style="font-size:.73rem;padding:4px 12px;">Modifier</button>
                            <button class="btn-atelier-danger btn-type-delete">Supprimer</button>
                        </div>
                    </div>
                    <div class="type-mgmt-edit d-none" style="margin-top:10px;">
                        <form class="type-edit-form d-flex gap-2 align-items-center" data-type-id="${t.id}">
                            <input type="text" name="name" class="cform-input" value="${escapeHtml(t.name)}" required style="flex:1;">
                            <button type="submit" class="btn-atelier-primary" style="width:auto;padding:8px 14px;font-size:.73rem;">✓</button>
                            <button type="button" class="btn-atelier-ghost btn-type-cancel" style="padding:8px 12px;font-size:.73rem;">✕</button>
                        </form>
                    </div>`
                listEl.appendChild(row)
            }
        } catch(e) { console.error(e); showError(e?.message||'Erreur types') }
    }

    async function renderArticleTypes(articleId, containerEl) {
        containerEl.innerHTML='<div style="color:rgba(191,233,255,.35);font-size:.8rem;padding:8px 0;">Chargement…</div>'
        try {
            const [allTypes, linkedTypeIds]=await Promise.all([listArticleTypes(), listTypesForArticle(articleId)])
            if (!allTypes.length) {
                containerEl.innerHTML='<hr style="border-color:rgba(191,233,255,.08);margin:14px 0;"><div style="color:rgba(191,233,255,.40);font-size:.8rem;">Aucun type disponible. <a href="#" onclick="document.querySelector(\'[data-tab=types]\').click();return false;" style="color:rgba(110,180,255,.7);">Créer un type →</a></div>'
                return
            }
            const linkedSet=new Set(linkedTypeIds)
            let html='<hr style="border-color:rgba(191,233,255,.08);margin:14px 0;"><p style="font-family:var(--font-title);font-size:.72rem;letter-spacing:.10em;text-transform:uppercase;color:rgba(191,233,255,.45);margin:0 0 10px;">🏷 Types associés</p>'
            html+=`<form class="art-types-form" data-article-id="${articleId}"><div class="d-flex flex-wrap gap-2" style="margin-bottom:10px;">`
            for (const t of allTypes) {
                const checked=linkedSet.has(t.id)?'checked':''
                html+=`<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.82rem;color:rgba(191,233,255,.80);background:rgba(110,180,255,.07);border:1px solid rgba(110,180,255,.18);border-radius:8px;padding:5px 12px;">
                    <input type="checkbox" name="type_id" value="${t.id}" ${checked} style="accent-color:#9ed7ff;">
                    ${escapeHtml(t.name)}
                </label>`
            }
            html+='</div><button type="submit" class="btn-atelier-ghost" style="font-size:.75rem;padding:6px 14px;">✓ Enregistrer les types</button></form>'
            containerEl.innerHTML=html
        } catch(e) { containerEl.innerHTML=`<div style="color:rgba(255,140,140,.7);font-size:.8rem;">${escapeHtml(e.message)}</div>` }
    }

    const listTypesEl=document.getElementById('list-types')

    listTypesEl.addEventListener('click', async e => {
        const row=e.target.closest('.type-mgmt-row'); if (!row) return
        const editBtn=e.target.closest('.btn-type-edit')
        const cancelBtn=e.target.closest('.btn-type-cancel')
        const deleteBtn=e.target.closest('.btn-type-delete')
        if (editBtn) {
            row.querySelector('.type-mgmt-display').classList.add('d-none')
            row.querySelector('.type-mgmt-edit').classList.remove('d-none')
            row.querySelector('input[name=name]').focus()
            return
        }
        if (cancelBtn) {
            row.querySelector('.type-mgmt-display').classList.remove('d-none')
            row.querySelector('.type-mgmt-edit').classList.add('d-none')
            return
        }
        if (deleteBtn) {
            const id=row.getAttribute('data-type-id')
            if (!confirm('Supprimer ce type ? Il sera dissocié de tous les articles.')) return
            deleteBtn.disabled=true
            try { await deleteArticleType(id); await renderTypes() }
            catch(err) { console.error(err); showError(err?.message||'Erreur'); deleteBtn.disabled=false }
        }
    })

    listTypesEl.addEventListener('submit', async e => {
        const editForm=e.target.closest('.type-edit-form'); if (!editForm) return
        e.preventDefault()
        const id=editForm.getAttribute('data-type-id')
        const name=editForm.querySelector('input[name=name]').value.trim()
        if (!name) { showError('Le nom est requis.'); return }
        const btn=editForm.querySelector('button[type=submit]'); btn.disabled=true
        try { await updateArticleType(id,{name}); await renderTypes() }
        catch(err) { console.error(err); showError(err?.message||'Erreur modification type'); btn.disabled=false }
    })

    document.getElementById('type-create-form').addEventListener('submit', async e => {
        e.preventDefault(); clearError()
        const name=document.getElementById('type-name').value.trim()
        if (!name) { showError('Le nom est requis.'); return }
        const btn=document.getElementById('type-create-btn'), label=document.getElementById('typeCreateLabel'), spinner=document.getElementById('typeCreateSpinner')
        btn.disabled=true; label.style.display='none'; spinner.style.display='inline-block'
        try { await insertArticleType({name}); e.target.reset(); await renderTypes() }
        catch(err) { console.error(err); showError(err?.message||'Erreur création type') }
        finally { btn.disabled=false; label.style.display='inline'; spinner.style.display='none' }
    })

    document.getElementById('refresh-types').addEventListener('click', renderTypes)
</script>
</body>
</html>
