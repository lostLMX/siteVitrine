<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra Draconis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .portail-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .portail-card {
            width: 100%;
            max-width: 400px;
            background: rgba(10, 16, 34, 0.70);
            border: 1px solid rgba(191, 233, 255, 0.18);
            border-radius: 20px;
            padding: 40px 36px;
            backdrop-filter: blur(14px);
            box-shadow: 0 32px 80px rgba(0,0,0,0.55);
        }
        .portail-brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .portail-sigil {
            font-size: 2.4rem;
            color: #9ed7ff;
            text-shadow: 0 0 28px rgba(158, 215, 255, 0.5);
            display: block;
            margin-bottom: 10px;
        }
        .portail-title {
            font-family: Cinzel, ui-serif, Georgia, serif;
            font-size: 0.82rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(191, 233, 255, 0.60);
            margin: 0;
        }
        .portail-divider {
            width: 32px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(110, 180, 255, 0.5), transparent);
            margin: 18px auto 28px;
        }
        .portail-msg {
            text-align: center;
            font-size: 0.82rem;
            min-height: 20px;
            margin-top: 14px;
            color: rgba(255, 120, 120, 0.90);
        }
        .portail-footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(191, 233, 255, 0.28);
            font-size: 0.72rem;
            letter-spacing: 0.06em;
        }
    </style>
</head>
<body class="theme-astra">
<div class="stars"></div>
<div class="nebula"></div>

<div class="portail-wrap">
    <div class="portail-card">
        <div class="portail-brand">
            <span class="portail-sigil">✦</span>
            <p class="portail-title">Astra Draconis</p>
        </div>
        <div class="portail-divider"></div>

        <div class="cform-group">
            <label class="cform-label" for="email">Adresse email</label>
            <input type="email" id="email" class="cform-input" placeholder="votre@email.com" required>
        </div>
        <div class="cform-group" style="margin-top: 12px;">
            <label class="cform-label" for="password">Mot de passe</label>
            <div style="position:relative;">
                <input type="password" id="password" class="cform-input" placeholder="••••••••••" required style="padding-right: 48px;">
                <button type="button" id="togglePwd" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(191,233,255,0.45);cursor:pointer;font-size:0.78rem;padding:2px 4px;" title="Afficher/masquer">👁</button>
            </div>
        </div>

        <button onclick="login()" class="cform-btn" style="margin-top: 22px;" id="loginBtn">
            <span id="loginLabel">Accéder</span>
            <span id="loginSpinner" class="cform-spinner" style="display:none;"></span>
        </button>

        <p id="message" class="portail-msg"></p>
        <p class="portail-footer">accès restreint · astra draconis</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
    document.getElementById('togglePwd').addEventListener('click', () => {
        const input = document.getElementById('password')
        const btn = document.getElementById('togglePwd')
        const isHidden = input.type === 'password'
        input.type = isHidden ? 'text' : 'password'
        btn.textContent = isHidden ? '🙈' : '👁'
    })

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') login()
    })

    async function login() {
        const email    = document.getElementById('email').value.trim()
        const password = document.getElementById('password').value
        const msg      = document.getElementById('message')
        const btn      = document.getElementById('loginBtn')
        const label    = document.getElementById('loginLabel')
        const spinner  = document.getElementById('loginSpinner')

        if (!email || !password) {
            msg.textContent = 'Veuillez remplir tous les champs.'
            return
        }

        label.style.display   = 'none'
        spinner.style.display = 'inline-block'
        btn.disabled = true
        msg.textContent = ''

        const { error } = await supabase.auth.signInWithPassword({ email, password })

        if (error) {
            msg.textContent = 'Identifiants incorrects.'
        } else {
            window.location.href = 'atelier.html'
        }

        label.style.display   = 'inline'
        spinner.style.display = 'none'
        btn.disabled = false
    }
</script>
</body>
</html>
