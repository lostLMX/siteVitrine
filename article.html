<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra Draconis — Article</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/logo.png" type="image/png">
    <style>
        /* ── Article detail layout ─────────────────────────────────── */
        .art-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(191,233,255,.60);
            font-family: 'Cinzel', serif;
            font-size: .72rem;
            letter-spacing: .14em;
            text-transform: uppercase;
            text-decoration: none;
            margin-bottom: 28px;
            transition: color 180ms ease;
        }
        .art-back:hover { color: rgba(191,233,255,.95); }

        .art-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(2.2rem, 5vw, 4rem);
            line-height: 1.1;
            text-align: center;
            color: rgba(243,246,255,.96);
            margin: 0 0 32px;
        }

        /* ── Main image ─────────────────────────────────────────────── */
        .art-main-wrap {
            position: relative;
            max-width: 720px;
            margin: 0 auto 20px;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(10,16,34,.55);
            border: 1px solid rgba(191,233,255,.10);
            box-shadow: 0 32px 90px rgba(0,0,0,.65);
            aspect-ratio: 4 / 3;
        }
        .art-main-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            transition: opacity 240ms ease;
        }
        .art-main-img.fading { opacity: 0; }
        .art-main-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(191,233,255,.20);
            font-size: 4rem;
        }
        .art-main-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px 16px;
            background: linear-gradient(transparent, rgba(4,8,18,.75));
            color: rgba(210,225,242,.82);
            font-size: .84rem;
            font-style: italic;
            text-align: center;
            min-height: 0;
        }

        /* ── Thumbnail carousel ─────────────────────────────────────── */
        .art-carousel-outer {
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 720px;
            margin: 0 auto 32px;
        }
        .art-carousel-btn {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border: 1px solid rgba(191,233,255,.22);
            border-radius: 50%;
            background: rgba(10,16,34,.55);
            color: rgba(191,233,255,.70);
            font-size: 1.1rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 180ms ease, color 180ms ease, background 180ms ease;
        }
        .art-carousel-btn:hover {
            border-color: rgba(191,233,255,.55);
            color: rgba(230,238,247,.95);
            background: rgba(30,50,90,.55);
        }
        .art-carousel-btn:disabled {
            opacity: .30;
            cursor: default;
        }
        .art-carousel-viewport {
            flex: 1;
            overflow: hidden;
        }
        .art-carousel-track {
            display: flex;
            gap: 8px;
            transition: transform 280ms ease;
        }
        .art-thumb {
            flex-shrink: 0;
            width: 90px;
            height: 68px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid rgba(191,233,255,.14);
            cursor: pointer;
            transition: border-color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
        }
        .art-thumb:hover {
            border-color: rgba(158,215,255,.55);
            transform: translateY(-2px);
        }
        .art-thumb.active {
            border-color: rgba(158,215,255,.90);
            box-shadow: 0 0 0 2px rgba(158,215,255,.22), 0 6px 18px rgba(0,0,0,.45);
        }

        /* ── Description ────────────────────────────────────────────── */
        .art-desc {
            max-width: 640px;
            margin: 0 auto 0;
            text-align: center;
            color: rgba(195,206,228,.82);
            font-size: 1.05rem;
            line-height: 1.72;
            font-style: italic;
        }

        /* ── State helpers ──────────────────────────────────────────── */
        .art-status {
            text-align: center;
            padding: 60px 0;
            color: rgba(191,233,255,.45);
            font-style: italic;
        }
    </style>
</head>
<body class="theme-astra">
<div class="stars" aria-hidden="true"></div>
<div class="nebula" aria-hidden="true"></div>

<!-- ── Navigation ──────────────────────────────────────────────────── -->
<nav class="navbar-ad">
    <div class="navbar-ad-container">
        <div class="navbar-ad-desktop">
            <div class="navbar-ad-left">
                <a class="nav-ad-link" href="index.html" data-i18n="nav.home">Accueil</a>
                <span class="nav-sep" aria-hidden="true">✦</span>
                <a class="nav-ad-link" href="presentation.html" data-i18n="nav.about">Présentation</a>
            </div>
            <a class="navbar-ad-brand" href="index.html">
                <img class="navbar-ad-logo" src="assets/logo.png" alt="Astra Draconis">
                <span class="navbar-ad-name">Astra Draconis</span>
            </a>
            <div class="navbar-ad-right">
                <a class="nav-ad-link active" href="galerie.html" data-i18n="nav.gallery">Galerie</a>
                <span class="nav-sep" aria-hidden="true">✦</span>
                <a class="nav-ad-link" href="contact.html" data-i18n="nav.contact">Contact</a>
                <button id="langBtn" class="lang-btn" onclick="toggleLang()">EN</button>
            </div>
        </div>
        <div class="navbar-ad-mobile-header">
            <a class="navbar-ad-mobile-brand" href="index.html">
                <img src="assets/logo.png" alt="Astra Draconis">
                <span>Astra Draconis</span>
            </a>
            <button class="navbar-ad-toggle" id="mobileNavBtn" aria-label="Menu">☰</button>
        </div>
        <div class="navbar-ad-mobile" id="mobileNav">
            <a class="nav-ad-link-mobile" href="index.html" data-i18n="nav.home">Accueil</a>
            <a class="nav-ad-link-mobile" href="presentation.html" data-i18n="nav.about">Présentation</a>
            <a class="nav-ad-link-mobile active" href="galerie.html" data-i18n="nav.gallery">Galerie</a>
            <a class="nav-ad-link-mobile" href="contact.html" data-i18n="nav.contact">Contact</a>
            <button class="lang-btn mt-2" onclick="toggleLang()" id="langBtnMobile">EN</button>
        </div>
    </div>
</nav>

<!-- ── Article content ─────────────────────────────────────────────── -->
<section class="section-astra">
    <div class="container">

        <div id="art-loading" class="art-status" data-i18n="article.loading">Chargement…</div>
        <div id="art-not-found" class="art-status d-none" data-i18n="article.not.found">Article introuvable.</div>

        <div id="art-body" class="d-none">
            <a class="art-back" href="galerie.html" data-i18n="article.back">← Retour à la galerie</a>

            <h1 class="art-title" id="art-title"></h1>

            <!-- Main image -->
            <div class="art-main-wrap" id="artMainWrap">
                <img class="art-main-img" id="artMainImg" src="" alt="">
                <div class="art-main-placeholder d-none" id="artMainPlaceholder">✷</div>
                <div class="art-main-caption" id="artMainCaption" style="display:none;"></div>
            </div>

            <!-- Thumbnail carousel -->
            <div class="art-carousel-outer" id="artCarouselOuter" style="display:none;">
                <button class="art-carousel-btn" id="artPrev" aria-label="Précédent">&#8249;</button>
                <div class="art-carousel-viewport">
                    <div class="art-carousel-track" id="artTrack"></div>
                </div>
                <button class="art-carousel-btn" id="artNext" aria-label="Suivant">&#8250;</button>
            </div>

            <!-- Description -->
            <p class="art-desc" id="art-desc" style="display:none;"></p>
        </div>

    </div>
</section>

<!-- ── Footer ─────────────────────────────────────────────────────── -->
<footer class="section-astra section-footer">
    <div class="container">
        <div class="footer-astra">
            <span class="footer-line">© <span id="year"></span> Astra Draconis</span>
            <span class="footer-sep" aria-hidden="true">✦</span>
            <a class="footer-line" href="contact.html" data-i18n="nav.contact">Contact</a>
            <span class="footer-sep" aria-hidden="true">✦</span>
            <a class="footer-line" href="galerie.html" data-i18n="nav.gallery">Galerie</a>
            <span class="footer-sep" aria-hidden="true">✦</span>
            <a class="footer-line" href="index.html" data-i18n="footer.back">Retour en haut</a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/script.js"></script>
<script>
    document.getElementById('year').textContent = new Date().getFullYear()

    function escapeHtml(str) {
        return (str || '').replace(/[&<>'"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))
    }

    // ── Carousel state ───────────────────────────────────────────────
    let photoData   = []
    let currentIdx  = 0
    let carouselOff = 0
    const THUMB_W   = 98  // thumb width + gap

    const mainImg     = document.getElementById('artMainImg')
    const mainCaption = document.getElementById('artMainCaption')
    const track       = document.getElementById('artTrack')
    const prevBtn     = document.getElementById('artPrev')
    const nextBtn     = document.getElementById('artNext')

    function selectPhoto(idx) {
        if (idx < 0 || idx >= photoData.length) return
        currentIdx = idx

        mainImg.classList.add('fading')
        setTimeout(() => {
            mainImg.src = photoData[idx].url
            mainImg.alt = escapeHtml(photoData[idx].caption || '')
            mainImg.classList.remove('fading')
        }, 120)

        if (photoData[idx].caption) {
            mainCaption.textContent = photoData[idx].caption
            mainCaption.style.display = ''
        } else {
            mainCaption.style.display = 'none'
        }

        track.querySelectorAll('.art-thumb').forEach((t, i) => {
            t.classList.toggle('active', i === idx)
        })

        ensureThumbVisible(idx)
    }

    function ensureThumbVisible(idx) {
        const viewport = document.querySelector('.art-carousel-viewport')
        if (!viewport) return
        const vw = viewport.offsetWidth
        const maxOff = Math.max(0, photoData.length * THUMB_W - vw)
        const desired = idx * THUMB_W - vw / 2 + THUMB_W / 2
        carouselOff = Math.min(Math.max(0, desired), maxOff)
        track.style.transform = `translateX(-${carouselOff}px)`
        updateCarouselBtns()
    }

    function updateCarouselBtns() {
        const viewport = document.querySelector('.art-carousel-viewport')
        if (!viewport) return
        const vw = viewport.offsetWidth
        const maxOff = Math.max(0, photoData.length * THUMB_W - vw)
        prevBtn.disabled = carouselOff <= 0
        nextBtn.disabled = carouselOff >= maxOff
    }

    prevBtn.addEventListener('click', () => {
        const viewport = document.querySelector('.art-carousel-viewport')
        const vw = viewport ? viewport.offsetWidth : 300
        carouselOff = Math.max(0, carouselOff - vw * 0.75)
        track.style.transform = `translateX(-${carouselOff}px)`
        updateCarouselBtns()
    })

    nextBtn.addEventListener('click', () => {
        const viewport = document.querySelector('.art-carousel-viewport')
        const vw = viewport ? viewport.offsetWidth : 300
        const maxOff = Math.max(0, photoData.length * THUMB_W - vw)
        carouselOff = Math.min(maxOff, carouselOff + vw * 0.75)
        track.style.transform = `translateX(-${carouselOff}px)`
        updateCarouselBtns()
    })

    window.addEventListener('resize', () => updateCarouselBtns())

    // ── Load article ─────────────────────────────────────────────────
    async function initArticle() {
        const params     = new URLSearchParams(window.location.search)
        const articleId  = params.get('id')
        const loadingEl  = document.getElementById('art-loading')
        const notFoundEl = document.getElementById('art-not-found')
        const bodyEl     = document.getElementById('art-body')

        if (!articleId) {
            loadingEl.classList.add('d-none')
            notFoundEl.classList.remove('d-none')
            return
        }

        try {
            const article = await getArticle(articleId)
            if (!article) throw new Error('not found')

            document.title = `Astra Draconis — ${article.title}`
            document.getElementById('art-title').textContent = article.title

            const descEl = document.getElementById('art-desc')
            if (article.description) {
                descEl.textContent = article.description
                descEl.style.display = ''
            }

            const photos = await listArticlePhotos(articleId)

            if (photos.length === 0) {
                if (article.cover_path) {
                    const url = await createSignedPhotoUrl(article.cover_path)
                    photoData = [{ url, caption: '' }]
                } else {
                    mainImg.classList.add('d-none')
                    document.getElementById('artMainPlaceholder').classList.remove('d-none')
                }
            } else {
                for (const photo of photos) {
                    try {
                        const url = await createSignedPhotoUrl(photo.path)
                        photoData.push({ url, caption: photo.caption || '' })
                    } catch (_) {}
                }
            }

            if (photoData.length > 0) {
                mainImg.src = photoData[0].url
                mainImg.alt = escapeHtml(photoData[0].caption || article.title)
                if (photoData[0].caption) {
                    mainCaption.textContent = photoData[0].caption
                    mainCaption.style.display = ''
                }

                if (photoData.length > 1) {
                    document.getElementById('artCarouselOuter').style.display = ''

                    photoData.forEach((p, i) => {
                        const thumb = document.createElement('img')
                        thumb.src     = p.url
                        thumb.alt     = escapeHtml(p.caption || '')
                        thumb.className = 'art-thumb' + (i === 0 ? ' active' : '')
                        thumb.loading = 'lazy'
                        thumb.addEventListener('click', () => selectPhoto(i))
                        track.appendChild(thumb)
                    })

                    updateCarouselBtns()
                }
            }

            loadingEl.classList.add('d-none')
            bodyEl.classList.remove('d-none')

        } catch (e) {
            console.error(e)
            loadingEl.classList.add('d-none')
            notFoundEl.classList.remove('d-none')
        }
    }

    initArticle()
</script>
</body>
</html>
