<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra Draconis — Article</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/logo.png" type="image/png">
    <style>
        .article-thumb-strip {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .article-thumb {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 7px;
            border: 2px solid rgba(191,233,255,.14);
            cursor: pointer;
            transition: border-color 180ms ease, transform 180ms ease;
            flex-shrink: 0;
        }
        .article-thumb:hover {
            border-color: rgba(158,215,255,.65);
            transform: translateY(-2px);
        }
        .article-thumb.active {
            border-color: rgba(158,215,255,.85);
            box-shadow: 0 0 0 2px rgba(158,215,255,.25);
        }
    </style>
</head>
<body class="theme-astra">
<div class="stars" aria-hidden="true"></div>
<div class="nebula" aria-hidden="true"></div>

<nav class="navbar navbar-expand-lg navbar-dark navbar-astra sticky-top">
    <div class="container">
        <a class="navbar-brand brand-astra" href="index.html">
            <span class="brand-mark" aria-hidden="true">✦</span>
            <span class="brand-text">Astra Draconis</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navAstra" aria-controls="navAstra" aria-expanded="false" aria-label="Menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navAstra">
            <div class="navbar-nav ms-auto gap-lg-2 align-items-lg-center">
                <a class="nav-link" href="presentation.html" data-i18n="nav.about">Présentation</a>
                <a class="nav-link active" href="galerie.html" data-i18n="nav.gallery">Galerie</a>
                <a class="nav-link" href="contact.html" data-i18n="nav.contact">Contact</a>
                <button id="langBtn" class="lang-btn" onclick="toggleLang()">EN</button>
            </div>
        </div>
    </div>
</nav>

<section class="section-astra">
    <div class="container">
        <a class="article-back-btn" href="galerie.html" data-i18n="article.back">← Retour à la galerie</a>

        <div id="article-loading" class="text-secondary" data-i18n="article.loading">Chargement…</div>
        <div id="article-not-found" class="text-secondary d-none" data-i18n="article.not.found">Article introuvable.</div>

        <div id="article-content" class="d-none">
            <h1 class="article-detail-title" id="article-title"></h1>
            <p class="article-detail-desc" id="article-desc"></p>

            <div class="row">
                <div class="col-lg-10 col-xl-8">
                    <div class="article-carousel-wrap">
                        <div id="articleCarousel" class="carousel slide" data-bs-ride="false">
                            <div class="carousel-inner" id="carouselInner"></div>
                            <button class="carousel-control-prev" type="button" data-bs-target="#articleCarousel" data-bs-slide="prev">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Précédent</span>
                            </button>
                            <button class="carousel-control-next" type="button" data-bs-target="#articleCarousel" data-bs-slide="next">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Suivant</span>
                            </button>
                        </div>
                    </div>
                    <p class="article-photo-count" id="photoCount"></p>
                    <div class="article-thumb-strip" id="thumbStrip"></div>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="section-astra section-footer">
    <div class="container">
        <div class="footer-astra" data-reveal>
            <div class="footer-line">© <span id="year"></span> Astra Draconis</div>
            <a class="footer-line" href="contact.html" data-i18n="nav.contact">Contact</a>
            <a class="footer-line" href="galerie.html" data-i18n="nav.gallery">Galerie</a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/script.js"></script>
<script>
    document.getElementById('year').textContent = new Date().getFullYear()

    function escapeHtml(str) {
        return (str || '').replace(/[&<>'"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))
    }

    async function initArticle() {
        const params    = new URLSearchParams(window.location.search)
        const articleId = params.get('id')
        const loadingEl = document.getElementById('article-loading')
        const notFoundEl = document.getElementById('article-not-found')
        const contentEl = document.getElementById('article-content')

        if (!articleId) {
            loadingEl.classList.add('d-none')
            notFoundEl.classList.remove('d-none')
            return
        }

        try {
            const article = await getArticle(articleId)
            if (!article) throw new Error('not found')

            document.title = `Astra Draconis — ${article.title}`
            document.getElementById('article-title').textContent = article.title
            const descEl = document.getElementById('article-desc')
            if (article.description) {
                descEl.textContent = article.description
            } else {
                descEl.style.display = 'none'
            }

            const photos = await listArticlePhotos(articleId)
            const carouselInner = document.getElementById('carouselInner')

            if (photos.length === 0) {
                if (article.cover_path) {
                    const url = await createSignedPhotoUrl(article.cover_path)
                    carouselInner.innerHTML = `
                        <div class="carousel-item active">
                            <img src="${url}" alt="${escapeHtml(article.title)}">
                        </div>`
                } else {
                    carouselInner.innerHTML = `<div class="carousel-item active" style="background:rgba(10,16,34,.55);min-height:300px;display:flex;align-items:center;justify-content:center;color:rgba(191,233,255,.25);font-size:3rem;">✷</div>`
                }
                document.getElementById('photoCount').style.display = 'none'
            } else {
                const controls = document.querySelectorAll('.carousel-control-prev, .carousel-control-next')
                if (photos.length === 1) controls.forEach(c => c.style.display = 'none')

                for (let i = 0; i < photos.length; i++) {
                    const photo = photos[i]
                    let url = null
                    try { url = await createSignedPhotoUrl(photo.path) } catch (_) { continue }
                    const item = document.createElement('div')
                    item.className = 'carousel-item' + (i === 0 ? ' active' : '')
                    item.innerHTML = `
                        <img src="${url}" alt="${escapeHtml(photo.caption || article.title)}">
                        ${photo.caption ? `
                        <div class="carousel-caption article-carousel-caption">
                            <p>${escapeHtml(photo.caption)}</p>
                        </div>` : ''}
                    `
                    carouselInner.appendChild(item)
                }

                const countEl = document.getElementById('photoCount')
                const thumbStrip = document.getElementById('thumbStrip')
                const carouselEl = document.getElementById('articleCarousel')

                const updateCount = () => {
                    const carousel = bootstrap.Carousel.getInstance(carouselEl)
                    const idx = carousel ? carousel._activeElement
                        ? Array.from(carouselInner.children).indexOf(carousel._activeElement) + 1
                        : 1 : 1
                    countEl.textContent = `${idx} / ${photos.length}`
                    thumbStrip.querySelectorAll('.article-thumb').forEach((t, i) => {
                        t.classList.toggle('active', i === idx - 1)
                    })
                }

                for (let i = 0; i < photos.length; i++) {
                    const photo = photos[i]
                    let turl = null
                    try { turl = await createSignedPhotoUrl(photo.path) } catch (_) { continue }
                    const thumb = document.createElement('img')
                    thumb.src = turl
                    thumb.alt = photo.caption || ''
                    thumb.className = 'article-thumb' + (i === 0 ? ' active' : '')
                    thumb.loading = 'lazy'
                    const idx = i
                    thumb.addEventListener('click', () => {
                        const bsCarousel = bootstrap.Carousel.getOrCreateInstance(carouselEl)
                        bsCarousel.to(idx)
                    })
                    thumbStrip.appendChild(thumb)
                }

                carouselEl.addEventListener('slid.bs.carousel', updateCount)
                updateCount()
            }

            loadingEl.classList.add('d-none')
            contentEl.classList.remove('d-none')

        } catch (e) {
            console.error(e)
            loadingEl.classList.add('d-none')
            notFoundEl.classList.remove('d-none')
        }
    }

    initArticle()
</script>
</body>
</html>
