<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra Draconis — Galerie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/logo.png" type="image/png">
</head>
<body class="theme-astra">
<div class="stars" aria-hidden="true"></div>
<div class="nebula" aria-hidden="true"></div>

<nav class="navbar-ad">
    <div class="navbar-ad-container">
        <div class="navbar-ad-desktop">
            <div class="navbar-ad-left">
                <a class="nav-ad-link" href="index.html" data-i18n="nav.home">Accueil</a>
                <span class="nav-sep" aria-hidden="true">✦</span>
                <a class="nav-ad-link" href="presentation.html" data-i18n="nav.about">Présentation</a>
            </div>
            <a class="navbar-ad-brand" href="index.html">
                <img class="navbar-ad-logo" src="assets/logo.png" alt="Astra Draconis">
                <span class="navbar-ad-name">Astra Draconis</span>
            </a>
            <div class="navbar-ad-right">
                <a class="nav-ad-link active" href="galerie.html" data-i18n="nav.gallery">Galerie</a>
                <span class="nav-sep" aria-hidden="true">✦</span>
                <a class="nav-ad-link" href="contact.html" data-i18n="nav.contact">Contact</a>
                <button id="langBtn" class="lang-btn" onclick="toggleLang()">EN</button>
            </div>
        </div>
        <div class="navbar-ad-mobile-header">
            <a class="navbar-ad-mobile-brand" href="index.html">
                <img src="assets/logo.png" alt="Astra Draconis">
                <span>Astra Draconis</span>
            </a>
            <button class="navbar-ad-toggle" id="mobileNavBtn" aria-label="Menu">☰</button>
        </div>
        <div class="navbar-ad-mobile" id="mobileNav">
            <a class="nav-ad-link-mobile" href="index.html" data-i18n="nav.home">Accueil</a>
            <a class="nav-ad-link-mobile" href="presentation.html" data-i18n="nav.about">Présentation</a>
            <a class="nav-ad-link-mobile" href="galerie.html" data-i18n="nav.gallery">Galerie</a>
            <a class="nav-ad-link-mobile" href="contact.html" data-i18n="nav.contact">Contact</a>
            <button class="lang-btn mt-2" onclick="toggleLang()" id="langBtnMobile">EN</button>
        </div>
    </div>
</nav>

<header class="page-hero" id="top">
    <div class="page-hero-inner">
        <h1 class="page-hero-title" data-reveal data-i18n="gallery.title">Galerie</h1>
        <div class="page-hero-subtitle-deco" data-reveal>
            <span class="deco-rule"></span>
            <span class="deco-dot">✦</span>
            <span data-i18n="gallery.subtitle">Cliquez sur une création pour découvrir sa page.</span>
            <span class="deco-dot">✦</span>
            <span class="deco-rule"></span>
        </div>
    </div>
</header>

<section class="section-astra">
    <div class="container">
        <div class="gallery-search-wrap" data-reveal>
            <div class="gallery-search-inner">
                <span class="gallery-search-icon">🔍</span>
                <input type="search" id="gallerySearch" class="gallery-search-input"
                    data-i18n-placeholder="gallery.search.placeholder"
                    placeholder="Rechercher une création…" autocomplete="off">
                <span class="gallery-search-count" id="searchCount"></span>
            </div>
        </div>

        <div id="article-grid" class="article-grid"></div>
        <div id="gallery-empty" class="text-secondary d-none mt-3" data-i18n="gallery.empty">Aucune création pour le moment.</div>
    </div>
</section>

<footer class="section-astra section-footer">
    <div class="container">
        <div class="footer-astra" data-reveal>
            <span class="footer-line">© <span id="year"></span> Astra Draconis</span>
            <span class="footer-sep" aria-hidden="true">✦</span>
            <a class="footer-line" href="contact.html" data-i18n="nav.contact">Contact</a>
            <span class="footer-sep" aria-hidden="true">✦</span>
            <a class="footer-line" href="#top" data-i18n="footer.back">Retour en haut</a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/script.js"></script>
<script>
    const articleGrid  = document.getElementById('article-grid')
    const emptyEl      = document.getElementById('gallery-empty')
    const searchInput  = document.getElementById('gallerySearch')
    const searchCount  = document.getElementById('searchCount')

    let allArticles = []

    function escapeHtml(str) {
        return (str || '').replace(/[&<>'"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))
    }

    function updateSearchCount(shown, total) {
        const suffix = shown !== 1 ? t('gallery.count.suffix.pl') : t('gallery.count.suffix')
        searchCount.textContent = shown < total ? `${shown} / ${total}` : `${total} ${suffix}`
    }

    function renderArticles(list) {
        articleGrid.innerHTML = ''
        if (!list.length) {
            emptyEl.classList.remove('d-none')
            return
        }
        emptyEl.classList.add('d-none')
        for (const art of list) {
            const card = document.createElement('a')
            card.href = `article.html?id=${art.id}`
            card.className = 'article-card'
            card.innerHTML = `
                ${art._coverUrl
                    ? `<img class="article-card-cover" src="${art._coverUrl}" alt="${escapeHtml(art.title)}" loading="lazy">`
                    : `<div class="article-card-cover-placeholder">✷</div>`
                }
                <div class="article-card-body">
                    <h2 class="article-card-title">${escapeHtml(art.title)}</h2>
                    ${art.description ? `<p class="article-card-desc">${escapeHtml(art.description)}</p>` : ''}
                    <span class="article-card-link" data-i18n="article.view">Voir la création →</span>
                </div>
            `
            articleGrid.appendChild(card)
        }
        applyTranslations()
    }

    async function loadGallery() {
        try {
            const articles = await listArticles()
            const paths = articles.filter(a => a.cover_path).map(a => a.cover_path)
            const urlMap = paths.length ? await createSignedPhotoUrlsBatch(paths) : {}
            for (const art of articles) {
                art._coverUrl = art.cover_path ? (urlMap[art.cover_path] || null) : null
            }
            allArticles = articles
            renderArticles(allArticles)
            updateSearchCount(allArticles.length, allArticles.length)
        } catch (e) {
            console.error(e)
            emptyEl.textContent = t('error.load')
            emptyEl.classList.remove('d-none')
        }
    }

    searchInput.addEventListener('input', () => {
        const q = searchInput.value.trim().toLowerCase()
        if (!q) {
            renderArticles(allArticles)
            updateSearchCount(allArticles.length, allArticles.length)
            return
        }
        const filtered = allArticles.filter(a =>
            (a.title || '').toLowerCase().includes(q) ||
            (a.description || '').toLowerCase().includes(q)
        )
        renderArticles(filtered)
        updateSearchCount(filtered.length, allArticles.length)
        if (!filtered.length) {
            emptyEl.textContent = t('gallery.no.result')
            emptyEl.classList.remove('d-none')
        }
    })

    document.addEventListener('langchange', () => {
        updateSearchCount(
            articleGrid.children.length,
            allArticles.length
        )
    })

    document.getElementById('year').textContent = new Date().getFullYear()
    loadGallery()
</script>
</body>
</html>
