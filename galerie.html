<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra Draconis — Galerie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/logo.png" type="image/png">
</head>
<body class="theme-astra">
<div class="stars" aria-hidden="true"></div>
<div class="nebula" aria-hidden="true"></div>

<nav class="navbar navbar-expand-lg navbar-dark navbar-astra sticky-top">
    <div class="container">
        <a class="navbar-brand brand-astra" href="index.html">
            <span class="brand-mark" aria-hidden="true">✦</span>
            <span class="brand-text">Astra Draconis</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navAstra" aria-controls="navAstra" aria-expanded="false" aria-label="Menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navAstra">
            <div class="navbar-nav ms-auto gap-lg-2 align-items-lg-center">
                <a class="nav-link" href="presentation.html" data-i18n="nav.about">Présentation</a>
                <a class="nav-link active" href="galerie.html" data-i18n="nav.gallery">Galerie</a>
                <a class="nav-link" href="contact.html" data-i18n="nav.contact">Contact</a>
                <button id="langBtn" class="lang-btn" onclick="toggleLang()">EN</button>
            </div>
        </div>
    </div>
</nav>

<header class="page-hero">
    <div class="container">
        <h1 class="page-hero-title" data-reveal data-i18n="gallery.title">Galerie</h1>
        <p class="page-hero-subtitle" data-reveal data-i18n="gallery.subtitle">Cliquez sur une création pour découvrir sa page.</p>
    </div>
</header>

<section class="section-astra">
    <div class="container">
        <div class="gallery-search-wrap" data-reveal>
            <div class="gallery-search-inner">
                <span class="gallery-search-icon">🔍</span>
                <input type="search" id="gallerySearch" class="gallery-search-input"
                    data-i18n-placeholder="gallery.search.placeholder"
                    placeholder="Rechercher une création…" autocomplete="off">
                <span class="gallery-search-count" id="searchCount"></span>
            </div>
        </div>

        <div id="article-grid" class="article-grid"></div>
        <div id="gallery-empty" class="text-secondary d-none mt-3" data-i18n="gallery.empty">Aucune création pour le moment.</div>
    </div>
</section>

<footer class="section-astra section-footer">
    <div class="container">
        <div class="footer-astra" data-reveal>
            <div class="footer-line">© <span id="year"></span> Astra Draconis</div>
            <a class="footer-line" href="contact.html" data-i18n="nav.contact">Contact</a>
            <a class="footer-line" href="#top" data-i18n="footer.back">Retour en haut</a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/script.js"></script>
<script>
    const articleGrid  = document.getElementById('article-grid')
    const emptyEl      = document.getElementById('gallery-empty')
    const searchInput  = document.getElementById('gallerySearch')
    const searchCount  = document.getElementById('searchCount')

    let allArticles = []

    function escapeHtml(str) {
        return (str || '').replace(/[&<>'"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))
    }

    function updateSearchCount(shown, total) {
        const suffix = shown !== 1 ? t('gallery.count.suffix.pl') : t('gallery.count.suffix')
        searchCount.textContent = shown < total ? `${shown} / ${total}` : `${total} ${suffix}`
    }

    function renderArticles(list) {
        articleGrid.innerHTML = ''
        if (!list.length) {
            emptyEl.classList.remove('d-none')
            return
        }
        emptyEl.classList.add('d-none')
        for (const art of list) {
            const card = document.createElement('a')
            card.href = `article.html?id=${art.id}`
            card.className = 'article-card'
            card.innerHTML = `
                ${art._coverUrl
                    ? `<img class="article-card-cover" src="${art._coverUrl}" alt="${escapeHtml(art.title)}" loading="lazy">`
                    : `<div class="article-card-cover-placeholder">✷</div>`
                }
                <div class="article-card-body">
                    <h2 class="article-card-title">${escapeHtml(art.title)}</h2>
                    ${art.description ? `<p class="article-card-desc">${escapeHtml(art.description)}</p>` : ''}
                    <span class="article-card-link" data-i18n="article.view">Voir la création →</span>
                </div>
            `
            articleGrid.appendChild(card)
        }
        applyTranslations()
    }

    async function loadGallery() {
        try {
            const articles = await listArticles()
            for (const art of articles) {
                art._coverUrl = null
                if (art.cover_path) {
                    try { art._coverUrl = await createSignedPhotoUrl(art.cover_path) } catch (_) {}
                }
            }
            allArticles = articles
            renderArticles(allArticles)
            updateSearchCount(allArticles.length, allArticles.length)
        } catch (e) {
            console.error(e)
            emptyEl.textContent = t('error.load')
            emptyEl.classList.remove('d-none')
        }
    }

    searchInput.addEventListener('input', () => {
        const q = searchInput.value.trim().toLowerCase()
        if (!q) {
            renderArticles(allArticles)
            updateSearchCount(allArticles.length, allArticles.length)
            return
        }
        const filtered = allArticles.filter(a =>
            (a.title || '').toLowerCase().includes(q) ||
            (a.description || '').toLowerCase().includes(q)
        )
        renderArticles(filtered)
        updateSearchCount(filtered.length, allArticles.length)
        if (!filtered.length) {
            emptyEl.textContent = t('gallery.no.result')
            emptyEl.classList.remove('d-none')
        }
    })

    document.addEventListener('langchange', () => {
        updateSearchCount(
            articleGrid.children.length,
            allArticles.length
        )
    })

    document.getElementById('year').textContent = new Date().getFullYear()
    loadGallery()
</script>
</body>
</html>
