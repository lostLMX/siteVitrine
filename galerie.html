<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/script.js"></script>
<script>
    const articleGrid    = document.getElementById('article-grid')
    const emptyEl        = document.getElementById('gallery-empty')
    const searchInput    = document.getElementById('gallerySearch')
    const searchCount    = document.getElementById('searchCount')
    const paginationEl   = document.getElementById('gallery-pagination')
    const filtersEl      = document.getElementById('gallery-filters')

    const GALLERY_PAGE_SIZE = 20
    let galleryPage = 1
    let allArticles = []
    let currentFilteredList = []
    let selectedTypeIds = new Set()

    function escapeHtml(str) {
        return (str || '').replace(/[&<>'"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))
    }

    function updateSearchCount(shown, total) {
        const suffix = shown !== 1 ? t('gallery.count.suffix.pl') : t('gallery.count.suffix')
        searchCount.textContent = shown < total ? `${shown} / ${total}` : `${total} ${suffix}`
    }

    function applyFilters() {
        const q = searchInput.value.trim().toLowerCase()
        let list = allArticles
        if (q) list = list.filter(a =>
            (a.title || '').toLowerCase().includes(q) ||
            (a.description || '').toLowerCase().includes(q)
        )
        if (selectedTypeIds.size > 0)
            list = list.filter(a => (a.types || []).some(t => selectedTypeIds.has(t.id)))
        return list
    }

    function renderFilters(articles) {
        const typeMap = new Map()
        for (const art of articles)
            for (const t of (art.types || []))
                if (!typeMap.has(t.id)) typeMap.set(t.id, t.name)
        filtersEl.innerHTML = ''
        if (!typeMap.size) return
        const sorted = [...typeMap.entries()].sort((a, b) => a[1].localeCompare(b[1]))
        for (const [id, name] of sorted) {
            const btn = document.createElement('button')
            btn.className = 'filter-type-btn'
            btn.textContent = name
            btn.addEventListener('click', () => {
                selectedTypeIds.has(id) ? selectedTypeIds.delete(id) : selectedTypeIds.add(id)
                btn.classList.toggle('active')
                galleryPage = 1
                renderArticles(applyFilters())
            })
            filtersEl.appendChild(btn)
        }
    }

    function renderPagination(containerEl, total, page, pageSize, onPage) {
        const totalPages = Math.ceil(total / pageSize)
        if (totalPages <= 1) { containerEl.innerHTML = ''; return }
        const pages = new Set([1, totalPages])
        for (let i = Math.max(1, page - 2); i <= Math.min(totalPages, page + 2); i++) pages.add(i)
        const sorted = [...pages].sort((a, b) => a - b)
        let html = '<div class="pagination-wrap">'
        html += `<button class="pg-btn" ${page <= 1 ? 'disabled' : ''} data-pg="${page - 1}">←</button>`
        let prev = 0
        for (const p of sorted) {
            if (p - prev > 1) html += '<span class="pg-ellipsis">…</span>'
            html += `<button class="pg-btn${p === page ? ' active' : ''}" data-pg="${p}">${p}</button>`
            prev = p
        }
        html += `<button class="pg-btn" ${page >= totalPages ? 'disabled' : ''} data-pg="${page + 1}">→</button>`
        html += '</div>'
        containerEl.innerHTML = html
        containerEl.querySelectorAll('.pg-btn:not([disabled])').forEach(btn => {
            btn.addEventListener('click', () => onPage(Number(btn.dataset.pg)))
        })
    }

    function renderArticles(list) {
        currentFilteredList = list
        articleGrid.innerHTML = ''
        paginationEl.innerHTML = ''
        emptyEl.classList.add('d-none')
        if (!list.length) {
            emptyEl.classList.remove('d-none')
            updateSearchCount(0, allArticles.length)
            return
        }
        const start = (galleryPage - 1) * GALLERY_PAGE_SIZE
        const pageItems = list.slice(start, start + GALLERY_PAGE_SIZE)
        for (const art of pageItems) {
            const card = document.createElement('a')
            card.href = `article.html?id=${art.id}`
            card.className = 'article-card'
            card.innerHTML = `
                ${art._coverUrl
                    ? `<img class="article-card-cover" src="${art._coverUrl}" alt="${escapeHtml(art.title)}" loading="lazy">`
                    : `<div class="article-card-cover-placeholder">✷</div>`
                }
                <div class="article-card-body">
                    <h2 class="article-card-title">${escapeHtml(art.title)}</h2>
                    ${art.description ? `<p class="article-card-desc">${escapeHtml(art.description)}</p>` : ''}
                    ${art.types && art.types.length ? `<div class="art-card-types">${art.types.map(t => `<span class="art-card-type-tag">${escapeHtml(t.name)}</span>`).join('')}</div>` : ''}
                    <span class="article-card-link" data-i18n="article.view">Voir la création →</span>
                </div>
            `
            articleGrid.appendChild(card)
        }
        applyTranslations()
        renderPagination(paginationEl, list.length, galleryPage, GALLERY_PAGE_SIZE, (p) => {
            galleryPage = p
            renderArticles(currentFilteredList)
            window.scrollTo({ top: 0, behavior: 'smooth' })
        })
        updateSearchCount(list.length, allArticles.length)
    }

    // Injecte les URLs d'une urlMap dans les cartes visibles du articleGrid
    // et met à jour art._coverUrl pour les rendus futurs (pagination, search)
    function applyUrlMap(articles, urlMap, targets) {
        for (const art of targets) {
            const url = urlMap[art.cover_path]
            if (!url) continue
            art._coverUrl = url
            const card = articleGrid.querySelector(`a[href="article.html?id=${art.id}"]`)
            if (!card) continue
            const placeholder = card.querySelector('.article-card-cover-placeholder')
            if (!placeholder) continue
            const img = document.createElement('img')
            img.className = 'article-card-cover'
            img.src = url
            img.alt = escapeHtml(art.title)
            img.loading = 'lazy'
            placeholder.replaceWith(img)
        }
    }

    async function loadGallery() {
        try {
            const articles = await listArticlesWithTypes()
            for (const art of articles) art._coverUrl = null
            allArticles = articles
            galleryPage = 1
            renderFilters(articles)
            renderArticles(allArticles)  // affichage immédiat avec placeholders

            const withCover = articles.filter(a => a.cover_path)
            if (!withCover.length) return

            // Batch 1 : uniquement la première page visible → affichage rapide
            const firstPage = withCover.slice(0, GALLERY_PAGE_SIZE)
            const firstPaths = firstPage.map(a => a.cover_path)
            const firstMap = await createSignedPhotoUrlsBatch(firstPaths)
            applyUrlMap(articles, firstMap, firstPage)

            // Batch 2 : le reste en arrière-plan, sans bloquer
            const rest = withCover.slice(GALLERY_PAGE_SIZE)
            if (!rest.length) return
            ;(async () => {
                const restMap = await createSignedPhotoUrlsBatch(rest.map(a => a.cover_path))
                applyUrlMap(articles, restMap, rest)
            })()
        } catch (e) {
            console.error(e)
            emptyEl.textContent = t('error.load')
            emptyEl.classList.remove('d-none')
        }
    }

    searchInput.addEventListener('input', () => {
        galleryPage = 1
        const filtered = applyFilters()
        renderArticles(filtered)
        if (!filtered.length) {
            emptyEl.textContent = t('gallery.no.result')
            emptyEl.classList.remove('d-none')
        }
    })

    document.addEventListener('langchange', () => {
        updateSearchCount(currentFilteredList.length, allArticles.length)
    })

    document.getElementById('year').textContent = new Date().getFullYear()
    loadGallery()

    // Admin
    ;(async () => {
        const session = await checkAuth()
        if (!session) return
        const btn = document.getElementById('admin-new-btn')
        btn.style.display = 'block'
        btn.querySelector('button').addEventListener('mouseover', function() {
            this.style.background = 'rgba(110,180,255,.18)'
            this.style.borderColor = 'rgba(110,180,255,.65)'
        })
        btn.querySelector('button').addEventListener('mouseout', function() {
            this.style.background = 'rgba(8,14,30,.85)'
            this.style.borderColor = 'rgba(110,180,255,.40)'
        })
    })()

    async function createNewArticle() {
        const btn = document.querySelector('#admin-new-btn button')
        btn.disabled = true
        btn.textContent = '…'
        try {
            const art = await insertArticle({ title: 'Nouvel article' })
            window.location.href = `article.html?id=${art.id}&edit=true`
        } catch (e) {
            console.error(e)
            btn.disabled = false
            btn.textContent = '+ Nouvel article'
        }
    }
</script>
